query GetGlobals {
  SiteSettings {
    typography {
      font
      fontSize
    }
    colors {
      backgroundColor
      primaryColor
    }
    navbar {
      textColor
      backgroundColor
      backgroundColorScroll
      logo {
        ...SVG
      }
      links {
        label
        url
        openInNewTab
      }
      buttons {
        label
        url
        variant
        openInNewTab
      }
    }
    footer {
      links {
        label
        url
        openInNewTab
      }
    }
    meta {
      title
      description
      image {
        ...Image
      }
    }
  }
}